<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <!-- Logo -->
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#00d4aa"/>
        <path d="M6 20 L10 14 L14 17 L18 10 L22 14" stroke="#0a0f1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="font-weight:800;font-size:16px;color:var(--text)">Algo<span style="color:var(--primary)">Soft</span></span>
    </div>

    <!-- Tabs -->
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPane('dashboard')" id="tab-dashboard">Dashboard</button>
      <button class="nav-tab" onclick="showPane('positions')" id="tab-positions">Positions</button>
      <button class="nav-tab" onclick="showPane('backtest')" id="tab-backtest">Backtest</button>
      <button class="nav-tab" onclick="showPane('history')" id="tab-history">History</button>
      <button class="nav-tab" onclick="showPane('calendar')" id="tab-calendar">Calendar</button>
      <button class="nav-tab" onclick="showPane('settings')" id="tab-settings">Settings</button>
    </div>

    <!-- Right controls -->
    <div class="nav-right">
      <!-- Bot toggle -->
      <label class="toggle" title="Bot ON/OFF" id="bot-main-toggle-wrap">
        <input type="checkbox" id="bot-main-toggle" onchange="onBotToggle(this.checked)">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span class="toggle-label" id="bot-toggle-lbl" style="color:var(--muted)">BOT</span>

      <div style="width:1px;height:22px;background:var(--border)"></div>

      <!-- Trading toggle -->
      <label class="toggle" title="Trading ON/OFF" id="trading-main-toggle-wrap">
        <input type="checkbox" id="trading-main-toggle" onchange="onTradingToggle(this.checked)">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span class="toggle-label" id="trading-toggle-lbl" style="color:var(--muted)">TRADE</span>

      <div style="width:1px;height:22px;background:var(--border)"></div>

      <!-- Mode badge -->
      <span id="mode-badge-nav" class="badge badge-paper">PAPER</span>

      <!-- Theme switcher -->
      <div style="position:relative" id="theme-switcher">
        <button class="theme-menu-btn" onclick="toggleThemeMenu()" title="Switch theme">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <span id="theme-label">Theme</span>
        </button>
        <div id="theme-menu" class="theme-dropdown hidden">
          <button class="theme-option" data-theme="dark"     onclick="applyTheme('dark')">🌑 Dark</button>
          <button class="theme-option" data-theme="light"    onclick="applyTheme('light')">☀️ Light</button>
          <button class="theme-option" data-theme="midnight" onclick="applyTheme('midnight')">🌌 Midnight</button>
          <button class="theme-option" data-theme="saffron"  onclick="applyTheme('saffron')">🌅 Saffron</button>
        </div>
      </div>

      <!-- User menu -->
      <div style="position:relative" id="user-menu-wrap">
        <button onclick="toggleUserMenu()" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px">
          <span id="nav-username">···</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div id="user-dropdown" style="display:none;position:absolute;right:0;top:36px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px;min-width:140px;z-index:200">
          <button onclick="showPane('settings');toggleUserMenu()" style="display:block;width:100%;text-align:left;padding:7px 12px;font-size:13px;color:var(--text);background:transparent;border:none;cursor:pointer;border-radius:6px" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='transparent'">⚙️ Settings</button>
          <hr style="border-color:var(--border);margin:4px 0">
          <a href="/logout" style="display:block;padding:7px 12px;font-size:13px;color:var(--error);text-decoration:none;border-radius:6px" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='transparent'">🚪 Sign out</a>
        </div>
      </div>
    </div>
  </div>
</nav>
