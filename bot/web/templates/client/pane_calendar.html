<!-- ══════════════════════════════════════════════════════════ CALENDAR PANE -->
<div class="pane" id="pane-calendar">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <h2 style="font-size:18px;font-weight:700;color:var(--text)">📅 Monthly PnL Calendar</h2>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="calNav(-1)" style="padding:5px 12px;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:13px">◀</button>
      <span id="cal-month-label" style="font-size:14px;font-weight:700;color:var(--text);min-width:120px;text-align:center">—</span>
      <button onclick="calNav(1)" style="padding:5px 12px;border-radius:6px;background:var(--card);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:13px">▶</button>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <!-- Day-of-week headers -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      <div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">MON</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">TUE</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">WED</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">THU</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">FRI</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">SAT</div>
      <div style="text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:6px 0">SUN</div>
    </div>
    <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px"></div>
  </div>

  <!-- Day detail modal overlay -->
  <div id="cal-day-detail" style="display:none;margin-top:4px">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span id="cal-detail-title" style="font-size:15px;font-weight:700;color:var(--text)">—</span>
        <button onclick="document.getElementById('cal-day-detail').style.display='none'" style="font-size:18px;background:none;border:none;color:var(--muted);cursor:pointer">✕</button>
      </div>
      <div id="cal-detail-body" style="font-size:13px;color:var(--muted)">No trades.</div>
    </div>
  </div>
</div>

</div><!-- /page -->

<!-- Mobile bottom nav -->
