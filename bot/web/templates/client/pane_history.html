<!-- ═══════════════════════════════════════════════════════════ HISTORY PANE -->
<div class="pane" id="pane-history">

  <!-- ── Plain-language daily summary ── -->
  <div class="card" style="padding:20px;margin-bottom:16px" id="hist-summary-card">
    <div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Today's Summary</div>
    <div id="hist-plain-summary" style="font-size:14px;line-height:1.7;color:var(--text)">Loading summary…</div>
  </div>

  <!-- ── Cumulative P&L chart ── -->
  <div class="card" style="padding:20px;margin-bottom:16px" id="hist-chart-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span class="sec-title">Cumulative P&amp;L (last 30 days)</span>
      <span id="hist-chart-badge" style="font-size:11px;color:var(--muted)"></span>
    </div>
    <div style="position:relative;height:180px">
      <canvas id="hist-pnl-chart"></canvas>
    </div>
  </div>

  <div class="card" style="padding:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <span class="sec-title">Trade History</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <select class="inp" id="hist-filter-mode" style="width:110px" onchange="loadHistory()">
          <option value="">All Modes</option>
          <option value="live">Live</option>
          <option value="paper">Paper</option>
        </select>
        <select class="inp" id="hist-filter-dir" style="width:110px" onchange="loadHistory()">
          <option value="">All</option>
          <option value="CALL">CALL</option>
          <option value="PUT">PUT</option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="loadHistory()">Refresh</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="trade-table" id="hist-table">
        <thead>
          <tr>
            <th>Date</th><th>Broker</th><th>Instrument</th><th>Dir</th>
            <th>Strike</th><th>Entry</th><th>Exit</th><th>PnL (pts)</th>
            <th>PnL (₹)</th><th>Mode</th><th>Reason</th>
          </tr>
        </thead>
        <tbody id="hist-body">
          <tr><td colspan="11" style="text-align:center;color:var(--muted);padding:24px">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:12px;color:var(--muted)" id="hist-count"></div>
  </div>
  </div><!-- close pane-history inner wrapper -->
</div>
