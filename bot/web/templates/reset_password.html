<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — AlgoSoft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0f1e; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    .input-field { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; padding: 10px 14px; width: 100%; font-size: 14px; }
    .input-field:focus { outline: none; border-color: #00d4aa; }
    .btn-primary { background: #00d4aa; color: #0a0f1e; font-weight: 700; border-radius: 8px; padding: 10px 0; width: 100%; font-size: 15px; transition: all 0.2s; cursor: pointer; border: none; }
    .btn-primary:hover { background: #00a882; }
    .msg { font-size: 13px; margin-top: 8px; display: none; }
    .msg.ok { color: #34d399; }
    .msg.err { color: #f87171; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<div class="card p-8 w-full max-w-sm">
  <div class="flex items-center gap-3 mb-8 justify-center">
    <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#00d4aa"/><path d="M6 20 L10 14 L14 17 L18 10 L22 14" stroke="#0a0f1e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="text-white font-bold text-xl">Algo<span style="color:#00d4aa">Soft</span></span>
  </div>

  <!-- Step 1: Enter email -->
  <div id="step-email">
    <h2 class="text-white font-bold text-xl mb-1">Reset Password</h2>
    <p class="text-sm mb-6" style="color:#64748b">Enter your email to receive a reset link</p>
    <div class="mb-4">
      <label class="block text-xs mb-1" style="color:#94a3b8">Email Address</label>
      <input id="reset-email" type="email" class="input-field" placeholder="you@example.com"/>
    </div>
    <p id="msg-email" class="msg"></p>
    <button onclick="sendResetLink()" class="btn-primary mt-2">Send Reset Link</button>
  </div>

  <!-- Step 2: Enter new password (shown when ?token= is in URL) -->
  <div id="step-reset" style="display:none">
    <h2 class="text-white font-bold text-xl mb-1">Set New Password</h2>
    <p class="text-sm mb-6" style="color:#64748b">Enter and confirm your new password</p>
    <div class="mb-4">
      <label class="block text-xs mb-1" style="color:#94a3b8">New Password</label>
      <input id="new-password" type="password" class="input-field" placeholder="Min. 6 characters"/>
    </div>
    <div class="mb-4">
      <label class="block text-xs mb-1" style="color:#94a3b8">Confirm Password</label>
      <input id="confirm-password" type="password" class="input-field" placeholder="Re-enter password"/>
    </div>
    <p id="msg-reset" class="msg"></p>
    <button onclick="submitReset()" class="btn-primary mt-2">Update Password</button>
  </div>

  <p class="text-center text-xs mt-5" style="color:#64748b">
    <a href="/login" style="color:#00d4aa">← Back to Sign In</a>
  </p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
if (token) {
  document.getElementById('step-email').style.display = 'none';
  document.getElementById('step-reset').style.display = 'block';
}

async function sendResetLink() {
  const email = document.getElementById('reset-email').value.trim();
  const msg = document.getElementById('msg-email');
  if (!email) { showMsg(msg, 'Please enter your email.', false); return; }
  const res = await fetch('/api/auth/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email})
  });
  const d = await res.json();
  showMsg(msg, d.message || 'Request sent.', d.success);
}

async function submitReset() {
  const pw  = document.getElementById('new-password').value;
  const pw2 = document.getElementById('confirm-password').value;
  const msg = document.getElementById('msg-reset');
  if (!pw || pw.length < 6) { showMsg(msg, 'Password must be at least 6 characters.', false); return; }
  if (pw !== pw2) { showMsg(msg, 'Passwords do not match.', false); return; }
  const res = await fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token, new_password: pw})
  });
  const d = await res.json();
  showMsg(msg, d.message || (d.detail || 'Error'), d.success || res.ok);
  if (d.success) setTimeout(() => window.location.href = '/login', 2000);
}

function showMsg(el, text, ok) {
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}
</script>
</body>
</html>
